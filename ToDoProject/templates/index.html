<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .container {
            width: 500px;
        }

        h1 {
            text-align: center;
            letter-spacing: 2px;
        }

        hr {
            margin: 20px 0;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .add-btn {
            margin-top: 10px;
            padding: 10px 18px;
            background-color: #2f353b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .task-box {
            margin-top: 20px;
            background-color: #bfc5ca;
            border-radius: 6px;
            overflow: hidden;
        }

        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #9aa1a6;
        }

        .task:last-child {
            border-bottom: none;
        }

        .buttons button {
            margin-left: 10px;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background-color: #e6e6e6;
        }

        .buttons button:hover {
            background-color: #d4d4d4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TODO LIST</h1>
    <hr>

  <form action="#" method="POST">
    {% csrf_token %}
        <input type="text" name="item" placeholder="add name . . .">
        <input type="text" name="description"  placeholder="add description . . .">
        <select name="priority" >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
        <button type="submit" class="add-btn">ADD</button>
        
    </form>

    <div class="task-box">
        {% for i in task %}
        <div class="task">
            <span>{{i.name}}</span>
            <span>{{i.description}}</span>
            <span>{{i.priority}}</span>
            
            <div class="buttons">
                <a href="delete/{{i.id}}">Delete</a>
                <a>Edit</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
